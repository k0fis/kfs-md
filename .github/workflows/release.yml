# =============================================================================
# release.yml — Build kfs-md.app + DMG → GitHub Release
# =============================================================================
#
# Spuštění:
#   git tag v0.1.0
#   git push origin v0.1.0
#
# Workflow:
#   1. Zkompiluje Swift projekt na macOS
#   2. Vytvoří .app bundle s Info.plist a fonty
#   3. Zabalí do DMG
#   4. Vytvoří GitHub Release
# =============================================================================

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build macOS App
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve dependencies
        run: swift package resolve

      - name: Build (release)
        run: swift build -c release

      - name: Package .app bundle
        run: |
          APP_NAME="kfs-md"
          BUNDLE="staging/${APP_NAME}.app"
          MACOS_DIR="${BUNDLE}/Contents/MacOS"
          RES_DIR="${BUNDLE}/Contents/Resources"

          mkdir -p "${MACOS_DIR}" "${RES_DIR}/Fonts"

          # Binary
          cp .build/release/KfsMd "${MACOS_DIR}/${APP_NAME}"

          # Fonts
          FONT_DIR=$(find .build -path "*/KfsMd_KfsMd.bundle/Fonts" -type d | head -1)
          if [ -n "$FONT_DIR" ]; then
            cp "$FONT_DIR"/*.ttf "${RES_DIR}/Fonts/"
          fi

          # Info.plist
          TAG=${GITHUB_REF_NAME:-0.1.0}
          VERSION=${TAG#v}
          cat > "${BUNDLE}/Contents/Info.plist" << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key>
            <string>kfs-md</string>
            <key>CFBundleDisplayName</key>
            <string>kfs-md</string>
            <key>CFBundleExecutable</key>
            <string>kfs-md</string>
            <key>CFBundleIdentifier</key>
            <string>eu.kofis.kfs-md</string>
            <key>CFBundleVersion</key>
            <string>${VERSION}</string>
            <key>CFBundleShortVersionString</key>
            <string>${VERSION}</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>NSHighResolutionCapable</key>
            <true/>
            <key>ATSApplicationFontsPath</key>
            <string>Fonts</string>
            <key>CFBundleDocumentTypes</key>
            <array>
              <dict>
                <key>CFBundleTypeName</key>
                <string>Markdown Document</string>
                <key>CFBundleTypeRole</key>
                <string>Editor</string>
                <key>LSHandlerRank</key>
                <string>Alternate</string>
                <key>LSItemContentTypes</key>
                <array>
                  <string>net.daringfireball.markdown</string>
                </array>
                <key>CFBundleTypeExtensions</key>
                <array>
                  <string>md</string>
                  <string>markdown</string>
                </array>
              </dict>
              <dict>
                <key>CFBundleTypeName</key>
                <string>Plain Text</string>
                <key>CFBundleTypeRole</key>
                <string>Editor</string>
                <key>LSHandlerRank</key>
                <string>Alternate</string>
                <key>LSItemContentTypes</key>
                <array>
                  <string>public.plain-text</string>
                </array>
                <key>CFBundleTypeExtensions</key>
                <array>
                  <string>txt</string>
                  <string>log</string>
                  <string>nfo</string>
                  <string>cfg</string>
                  <string>ini</string>
                  <string>conf</string>
                </array>
              </dict>
            </array>
          </dict>
          </plist>
          EOF

          # Ad-hoc sign
          codesign --force --sign - "${BUNDLE}"

          # DMG
          hdiutil create -volname "kfs-md" \
            -srcfolder staging \
            -ov -format UDZO \
            "kfs-md-macos-arm64.dmg"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kfs-md-macos
          path: kfs-md-macos-arm64.dmg

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
